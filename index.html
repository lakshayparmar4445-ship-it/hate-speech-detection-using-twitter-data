<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hate Speech Detection</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:500px;
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    font-size:16px;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">
    <h1>Hate Speech Detection</h1>

    <textarea id="textInput"
        placeholder="Enter text here..."></textarea>

    <br>

    <button onclick="predict()">
        Predict
    </button>

    <div id="result"></div>
</div>

<script>
async function predict() {

    const text = document.getElementById("textInput").value;

    try {

        const response = await fetch(
            "http://127.0.0.1:8000/predict",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    text: text
                })
            }
        );

        const data = await response.json();

        if(data.prediction === 1){
            document.getElementById("result").innerHTML =
                "🚨 Hate Speech Detected";
        }
        else{
            document.getElementById("result").innerHTML =
                "✅ Not Hate Speech";
        }

    } catch(error) {
        document.getElementById("result").innerHTML =
            "❌ Could not connect to FastAPI server";
    }
}
</script>

</body>
</html>
